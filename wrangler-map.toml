# eazpire-map-portal — Ecosystem architecture map (Admin-only)
#
# Deploy: npm run deploy:map
# Dev:    npm run dev:map
#
# Secrets (wrangler secret put -c wrangler-map.toml):
#   RESEND_API_KEY, PARTNER_JWT_SECRET (or JWT_APP_SECRET)
# Sync from partner worker: npm run map:secrets

name = "eazpire-map-portal"
main = "src/map-worker.js"
compatibility_date = "2025-01-15"
compatibility_flags = [ "nodejs_compat" ]

workers_dev = true

[[routes]]
pattern = "map.eazpire.com/*"
zone_name = "eazpire.com"

[vars]
MAP_PORTAL_URL = "https://map.eazpire.com"
# Same allowlist as admin.eazpire.com / partner worker
ADMIN_OWNER_IDS = "9415375946010"
ADMIN_OWNER_EMAILS = "tobi.muss@hotmail.com"
ACCOUNT_DELETION_FROM_EMAIL = "Eazpire <noreply@eazpire.com>"

[[kv_namespaces]]
binding = "JOBS"
id = "46fe4f02bc6544c286ea28ac0b4d9e22"

[assets]
binding = "MAP_ASSETS"
directory = "map-static"
run_worker_first = true
